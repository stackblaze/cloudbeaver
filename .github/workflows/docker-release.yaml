name: Docker Build and Push

# Tag push (v*.*.*-sb.*) → build + push GHCR + publish Release → deploy.yaml
on:
  push:
    tags: ['v*.*.*']
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build/push (defaults to github.ref_name)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stackblaze/cloudbeaver

jobs:
  build:
    runs-on: [self-hosted, cloudbeaver]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n '${{ inputs.tag }}' ]; then
            tag='${{ inputs.tag }}'
          else
            tag='${{ github.ref_name }}'
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "Building tag: $tag"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: cloudbeaver-builder
          cleanup: false

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' || inputs.tag == '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/stackblaze/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Publish GitHub Release
        # Use CHAIN_PAT so release.published triggers deploy.yaml
        # (GITHUB_TOKEN-created releases do not fire other workflows).
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.CHAIN_PAT || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — dispatching deploy manually"
            gh workflow run deploy.yaml --repo "${{ github.repository }}" -f tag="$TAG" || true
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "CloudBeaver image ghcr.io/${IMAGE_NAME}:$TAG"
          fi
