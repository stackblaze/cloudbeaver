{
    server: {
        serverName: "${CLOUDBEAVER_SERVER_NAME:Stackblaze Database}",

        rootURI: "${CLOUDBEAVER_ROOT_URI:/}",
        serviceURI: "${CLOUDBEAVER_SERVICE_URI:/api/}",

        productSettings: {
            "core.theming.theme": "${CLOUDBEAVER_CORE_THEMING_THEME:light}",
            "core.localization.language": "en"
        },

        expireSessionAfterPeriod: "${CLOUDBEAVER_EXPIRE_SESSION_AFTER_PERIOD:1800000}"
    },
    app: {
        anonymousAccessEnabled: false,
        grantConnectionsAccessToAnonymousTeam: false,
        supportsCustomConnections: false,
        enableReverseProxyAuth: true,
        enabledAuthProviders: [
            "local",
            "reverseProxy"
        ],
        enabledDrivers: [
            "postgresql:postgres-jdbc",
            "mysql:mariaDB",
            "mysql:mysql8"
        ],
        disabledDrivers: [
            "sqlite:sqlite_jdbc",
            "sqlite:libsql_jdbc",
            "h2:h2_embedded",
            "h2:h2_embedded_v2",
            "h2:h2_embedded_v3",
            "clickhouse:yandex_clickhouse",
            "clickhouse:com_clickhouse",
            "jaybird:jaybird",
            "sqlserver:microsoft",
            "oracle:oracle_thin",
            "db2:db2",
            "db2_i:db2_iseries",
            "generic:trino_jdbc",
            "duckdb:duckdb_jdbc",
            "generic:kyuubi_hive",
            "databend:databend"
        ]
    }
}
