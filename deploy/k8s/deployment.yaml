apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudbeaver-workspace
  namespace: cloudbeaver
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudbeaver-conf
  namespace: cloudbeaver
data:
  cloudbeaver.conf: |
    {
        server: {
            serverPort: 8978,
            serverName: "Stackblaze Database",
            contentRoot: "web",
            driversLocation: "drivers",
            rootURI: "/cb",
            serviceURI: "/api/",
            productSettings: {
                "core.theming.theme": "light"
            },
            expireSessionAfterPeriod: 1800000,
            sm: {
                enableBruteForceProtection: true
            },
            database: {
                driver: "h2_embedded_v2",
                url: "jdbc:h2:${workspace}/.data/cb.h2v2",
                createDatabase: true,
                initialDataConfiguration: "conf/initial-data.conf",
                pool: {
                    minIdleConnections: 4,
                    maxIdleConnections: 10,
                    maxConnections: 100,
                    validationQuery: "SELECT 1"
                }
            }
        },
        app: {
            anonymousAccessEnabled: false,
            grantConnectionsAccessToAnonymousTeam: false,
            supportsCustomConnections: false,
            enableReverseProxyAuth: true,
            enabledAuthProviders: [
                "local",
                "reverseProxy"
            ],
            enabledDrivers: [
                "postgresql:postgres-jdbc",
                "mysql:mariaDB",
                "mysql:mysql8",
                "redis:redis"
            ],
            resourceQuotas: {
                dataExportFileSizeLimit: 10000000,
                sqlMaxRunningQueries: 100,
                sqlResultSetRowsLimit: 100000,
                sqlTextPreviewMaxLength: 4096,
                sqlBinaryPreviewMaxLength: 261120
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: cloudbeaver
  labels:
    app: cloudbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: cloudbeaver
          image: ghcr.io/stackblaze/cloudbeaver:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8978
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
            - name: conf
              mountPath: /opt/cloudbeaver/conf/cloudbeaver.conf
              subPath: cloudbeaver.conf
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /cb/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /cb/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cloudbeaver-workspace
        - name: conf
          configMap:
            name: cloudbeaver-conf
---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  namespace: cloudbeaver
  labels:
    app: cloudbeaver
spec:
  selector:
    app: cloudbeaver
  ports:
    - name: http
      port: 8978
      targetPort: http
