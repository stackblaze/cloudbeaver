# Self-hosted Actions runner for stackblaze/cloudbeaver (DinD for image builds).
# Labels: self-hosted,cloudbeaver — used by docker-release + deploy workflows.
apiVersion: v1
kind: Namespace
metadata:
  name: github-runners
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudbeaver-gha-runner
  namespace: github-runners
type: Opaque
stringData:
  ACCESS_TOKEN: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver-gha-runner
  namespace: github-runners
  labels:
    app: cloudbeaver-gha-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver-gha-runner
  template:
    metadata:
      labels:
        app: cloudbeaver-gha-runner
    spec:
      containers:
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
        - name: runner
          image: myoung34/github-runner:latest
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: REPO_URL
              value: https://github.com/stackblaze/cloudbeaver
            - name: RUNNER_NAME_PREFIX
              value: cloudbeaver-prod
            - name: RUNNER_SCOPE
              value: repo
            - name: LABELS
              value: self-hosted,cloudbeaver,Linux,X64
            - name: EPHEMERAL
              value: "false"
            - name: DISABLE_AUTO_UPDATE
              value: "false"
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudbeaver-gha-runner
                  key: ACCESS_TOKEN
            - name: RUNNER_WORKDIR
              value: /runner/_work
          volumeMounts:
            - name: work
              mountPath: /runner/_work
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
