apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudbeaver
  namespace: cloudbeaver
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - db.stackblaze.cloud
      secretName: cloudbeaver-tls
  rules:
    - host: db.stackblaze.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudbeaver
                port:
                  number: 8978
