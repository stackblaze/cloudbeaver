fragment ServerConfig on ServerConfig {
  name
  version
  workspaceId
  rootURI
  containerId
  defaultAuthRole
  defaultUserTeam
  productConfiguration
  supportsCustomConnections
  sessionExpireTime

  anonymousAccessEnabled
  bindSessionToIp

  adminCredentialsSaveEnabled
  publicCredentialsSaveEnabled

  resourceManagerEnabled
  secretManagerEnabled

  configurationMode
  developmentMode
  redirectOnFederatedAuth
  distributed

  enabledFeatures
  disabledBetaFeatures
  enabledAuthProviders
  supportedLanguages {
    isoCode
    displayName
    nativeName
  }
  disabledDrivers
  forceHttps
  supportedHosts
}
