mutation getSqlExecuteTaskResults($taskId: ID!) {
  result: asyncSqlExecuteResults(taskId: $taskId) {
    duration
    statusMessage
    filterText
    fullQuery
    originalQuery
    results {
      title
      updateRowCount
      sourceQuery
      dataFormat
      resultSet {
        id
        readOnly
        columns {
          dataKind
          entityName
          fullTypeName
          icon
          description
          label
          maxLength
          name
          position
          precision
          required
          autoGenerated
          readOnly
          readOnlyStatus
          scale
          typeName
          supportedOperations {
            id
            expression
            argumentCount
          }
        }
        rowsWithMetaData {
          data
          metaData
        }
        associations {
          associationName
          targetEntityName
          nodePath
          columnIndexList
        }
        references {
          associationName
          targetEntityName
          nodePath
          columnIndexList
        }
        singleEntity
        hasMoreData
        hasRowIdentifier
        rowIdentifierState
        rowIdentifier {
          attributes {
            name
            ordinalPosition
          }
          constraintType
        }
        isSupportsDataFilter
        hasChildrenCollection
        hasDynamicTrace
      }
    }
  }
}
