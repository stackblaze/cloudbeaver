query sqlGenerateResultSetQuery(
  $projectId: ID
  $connectionId: ID!
  $contextId: ID!
  $generatorId: SQLResultSetGeneratorId!
  $resultsId: ID!
  $selectedRows: [SQLResultRow!]!
) {
  sqlGenerateResultSetQuery(
    projectId: $projectId
    connectionId: $connectionId
    contextId: $contextId
    generatorId: $generatorId
    resultsId: $resultsId
    selectedRows: $selectedRows
  )
}
